<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaire de Devis - Mon Entreprise</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    h2 {
      background-color: #004080;
      color: white;
      padding: 10px;
      border-radius: 5px;
    }
    fieldset {
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 5px;
      background-color: white;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #d60000;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    .total {
      font-weight: bold;
      text-align: right;
    }
  </style>
</head>
<body>
  <h2>Formulaire de Devis</h2>

  <form id="devisForm" onsubmit="genererPDF(event)">
    <fieldset>
      <legend>Informations du Client</legend>
      <label>Nom de l'entreprise</label>
      <input type="text" name="client_nom">
      <label>Email</label>
      <input type="email" name="client_email">
      <label>Adresse</label>
      <input type="text" name="client_adresse">
      <label>Téléphone</label>
      <input type="text" name="client_tel">
    </fieldset>

    <fieldset>
      <legend>Informations de l'Entreprise</legend>
      <label>Nom</label>
      <input type="text" value="BEN-G Fermetures" readonly>
      <label>Adresse</label>
      <input type="text" value="39 Rue de la Gare de Reuilly 75012 Paris" readonly>
      <label>Téléphone</label>
      <input type="text" value="+33 1 89 70 39 85" readonly>
      <label>Email</label>
      <input type="text" value="contact@bengfermetures.fr" readonly>
    </fieldset>

    <fieldset>
      <legend>Objet du devis</legend>
      <input type="text" name="objet">
    </fieldset>

    <fieldset>
      <legend>Articles</legend>
      <table id="articlesTable">
        <thead>
          <tr>
            <th>Description</th>
            <th>Prix HT (€)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="text" name="description[]"></td>
            <td><input type="number" name="prix[]" step="0.01" oninput="calculTotal()"></td>
          </tr>
        </tbody>
      </table>
      <button type="button" onclick="ajouterLigne()">Ajouter une ligne</button>
    </fieldset>

    <fieldset>
      <legend>Total</legend>
      <p class="total">Total HT : <span id="totalHT">0.00</span> €</p>
      <p class="total">TVA (20%) : <span id="tva">0.00</span> €</p>
      <p class="total">Total TTC : <span id="totalTTC">0.00</span> €</p>
    </fieldset>

    <fieldset>
      <legend>Informations de Paiement</legend>
      <label>IBAN</label>
      <input type="text" value="FR76 1695 8000 0151 4502 9526 416">
      <label>BIC/SWIFT</label>
      <input type="text" value="QNTOFRP1XX">
      <label>Code banque</label>
      <input type="text" value="16958">
      <label>Code guichet</label>
      <input type="text" value="00001">
      <label>Numéro de compte</label>
      <input type="text" value="51450295264">
      <label>Clé RIB</label>
      <input type="text" value="16">
      <label>Modalité de règlement</label>
      <input type="text" placeholder="Ex : Virement sous 30 jours">
    </fieldset>

    <button type="submit">Générer le devis (PDF)</button>
    
  </form>

<script>
    function ajouterLigne() {
      const table = document.getElementById('articlesTable').getElementsByTagName('tbody')[0];
      const row = table.insertRow();
      const descCell = row.insertCell(0);
      const prixCell = row.insertCell(1);
      descCell.innerHTML = '<input type="text" name="description[]">';
      prixCell.innerHTML = '<input type="number" name="prix[]" step="0.01" oninput="calculTotal()">';
    }

    function calculTotal() {
      const prixInputs = document.getElementsByName('prix[]');
      let totalHT = 0;
      prixInputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) totalHT += val;
      });
      const tva = totalHT * 0.20;
      const totalTTC = totalHT + tva;
      document.getElementById('totalHT').innerText = totalHT.toFixed(2);
      document.getElementById('tva').innerText = tva.toFixed(2);
      document.getElementById('totalTTC').innerText = totalTTC.toFixed(2);
    }

    async function genererPDF(event) {
      event.preventDefault();
      const jsPDF = window.jspdf.jsPDF;
      const doc = new jsPDF();

      doc.setTextColor(0, 64, 128); // bleu foncé
      doc.setFontSize(18);
      doc.text("DEVIS  Ben-G Fermetures", 105, 20, { align: "center" });

      doc.setFontSize(10);
      doc.setTextColor(0);

      const numeroDevis = 'DEV-' + Date.now();
      const dateDevis = new Date().toLocaleDateString('fr-FR');

      let y = 30;
      doc.setTextColor(213, 0, 0); // rouge vif
      doc.text(`N° de devis : ${numeroDevis}`, 140, y);
      y += 6;
      doc.text(`Date : ${dateDevis}`, 140, y);
      y += 6;

      const getInputValue = (name) => document.querySelector(`input[name='${name}']`)?.value || '';
      const clientNom = getInputValue('client_nom');
      const clientAdresse = getInputValue('client_adresse');
      const clientEmail = getInputValue('client_email');
      const clientTel = getInputValue('client_tel');
      const objet = getInputValue('objet');

      const entrepriseNom = 'BEN-G Fermetures';
      const entrepriseAdresse = '39 Rue de la Gare de Reuilly 75012 Paris';
      const entrepriseTel = '+33 1 89 70 39 85';
      const entrepriseEmail = 'contact@bengfermetures.fr';

      doc.setTextColor(0, 64, 128);
      doc.text(`Entreprise : ${entrepriseNom}`, 20, y); y += 6;
      doc.text(`Adresse : ${entrepriseAdresse}`, 20, y); y += 6;
      doc.text(`Téléphone : ${entrepriseTel}`, 20, y); y += 6;
      doc.text(`Email : ${entrepriseEmail}`, 20, y); y += 10;

      doc.setTextColor(0);
      doc.text(`Client : ${clientNom}`, 20, y); y += 6;
      doc.text(`Adresse : ${clientAdresse}`, 20, y); y += 6;
      doc.text(`Email : ${clientEmail}`, 20, y); y += 6;
      doc.text(`Téléphone : ${clientTel}`, 20, y); y += 10;

      doc.setTextColor(0, 64, 128);
      doc.text(`Objet : ${objet}`, 20, y); y += 10;

      doc.setTextColor(0);
      doc.text("Articles :", 20, y); y += 6;
      const descriptions = document.getElementsByName('description[]');
      const prix = document.getElementsByName('prix[]');

      for (let i = 0; i < descriptions.length; i++) {
        const desc = descriptions[i].value;
        const p = prix[i].value;
        if (desc || p) {
          doc.text(`- ${desc} : ${p} € HT`, 25, y);
          y += 6;
        }
      }

      y += 6;
      const totalHT = document.getElementById('totalHT').innerText;
      const tva = document.getElementById('tva').innerText;
      const totalTTC = document.getElementById('totalTTC').innerText;

      doc.setTextColor(213, 0, 0);
      doc.text(`Total HT : ${totalHT} €`, 20, y); y += 6;
      doc.text(`TVA (20%) : ${tva} €`, 20, y); y += 6;
      doc.text(`Total TTC : ${totalTTC} €`, 20, y); y += 10;

      doc.setTextColor(0);
      doc.text("Informations de paiement :", 20, y); y += 6;
      const labels = ["IBAN", "BIC/SWIFT", "Code banque", "Code guichet", "Numéro de compte", "Clé RIB", "Modalité de règlement"];
      const inputs = document.querySelectorAll('fieldset:last-of-type input');
      for (let i = 0; i < inputs.length; i++) {
        const val = inputs[i].value;
        if (val) {
          doc.text(`${labels[i]} : ${val}`, 25, y);
          y += 6;
        }
      }

      y += 10;
      doc.text("Signature du client :", 20, y);
      doc.line(70, y, 160, y);
      y += 10;
      doc.text("Cachet ou signature de l'entreprise :", 20, y);
      doc.line(100, y, 180, y);

      doc.save("devis.pdf");
    }
  </script>
</body>
</html>
